name: Generate Snake

on:
  # Spustí se automaticky každých 12 hodin
  schedule:
    - cron: "0 */12 * * *"
  
  # Umožní spustit skript ručně kliknutím
  workflow_dispatch:
  
  # Spustí se při každém pushnutí kódu na GitHub
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generování hada z GitHub příspěvků
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Uložení vygenerovaného hada do skryté větve 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
